name: CodeQL

# Static analysis (SAST) for the TypeScript codebase. Findings land in the repo's
# Security tab — code scanning is free on public repos, so no GitHub Advanced
# Security toggle is required here.
#
# The `Analyze (javascript-typescript)` job IS a required status check on main (added
# 2026-06-23) — if the CodeQL scan fails to run or upload (e.g. a broken codeql-action
# bump), the red X BLOCKS the merge / auto-merge. This gates on the scan RUNNING
# successfully, not on zero findings: code-scanning alerts still surface as non-blocking
# results in the Security tab. We avoid `continue-on-error: true` on purpose — it would
# mask genuine setup/upload errors as a green check.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "todos/**"
  pull_request:
    branches: ["**"]
  schedule:
    # Weekly scan (Mondays 03:27 UTC) catches newly-published rules against unchanged code.
    - cron: "27 3 * * 1"

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # security-extended surfaces more than the default security-and-quality suite.
          queries: security-extended
          # Scope ANALYSIS to our TS source dirs. This is CodeQL config-level scoping
          # (what gets analyzed) — distinct from on.push.paths above (which only gates
          # WHEN the workflow runs, not what CodeQL extracts).
          config: |
            paths:
              - client
              - server
              - shared
            paths-ignore:
              - node_modules
              - server_dist
              - ios
              - android

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
