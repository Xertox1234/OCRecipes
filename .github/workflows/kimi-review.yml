name: Kimi Review

on:
  pull_request_target:
    branches: ["**"]
    paths:
      - "**/*.ts"
      - "**/*.tsx"

concurrency:
  # Key on the PR number — under pull_request_target github.ref is the base
  # branch, so keying on it would make every PR to the same base cancel the others.
  group: kimi-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Kimi Review
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Skip when not enabled
        if: vars['KIMI_REVIEW_CI_ENABLED'] != 'true'
        run: echo "Kimi Review CI is disabled. Set repository variable KIMI_REVIEW_CI_ENABLED=true to enable it."

      - name: Skip fork pull requests
        if: vars['KIMI_REVIEW_CI_ENABLED'] == 'true' && github.event.pull_request.head.repo.full_name != github.repository
        run: echo "Kimi Review CI is skipped for fork pull requests because repository secrets are unavailable."

      - uses: actions/checkout@v4
        if: vars['KIMI_REVIEW_CI_ENABLED'] == 'true' && github.event.pull_request.head.repo.full_name == github.repository
        with:
          # pull_request_target has secrets; keep the working tree on trusted base
          # code and fetch PR head only as diff data for scripts/ci-kimi-review.sh.
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      - name: Fetch pull request head
        if: vars['KIMI_REVIEW_CI_ENABLED'] == 'true' && github.event.pull_request.head.repo.full_name == github.repository
        run: git fetch --no-tags --depth=1 origin ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-python@v5
        if: vars['KIMI_REVIEW_CI_ENABLED'] == 'true' && github.event.pull_request.head.repo.full_name == github.repository
        with:
          python-version: "3.12"

      - name: Install kimi-review dependencies
        if: vars['KIMI_REVIEW_CI_ENABLED'] == 'true' && github.event.pull_request.head.repo.full_name == github.repository
        run: python -m pip install "openai>=1.0.0,<2"

      - name: Run kimi-review
        if: vars['KIMI_REVIEW_CI_ENABLED'] == 'true' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          KIMI_REVIEW_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          KIMI_REVIEW_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          KIMI_REVIEW_SCOPE: "CI PR diff"
          WORKER_API_KEY: ${{ secrets['WORKER_API_KEY'] }}
          OPENROUTER_API_KEY: ${{ secrets['OPENROUTER_API_KEY'] }}
          MOONSHOT_API_KEY: ${{ secrets['MOONSHOT_API_KEY'] }}
          WORKER_BASE_URL: ${{ secrets['WORKER_BASE_URL'] }}
        run: bash scripts/ci-kimi-review.sh