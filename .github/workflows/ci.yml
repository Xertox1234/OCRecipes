name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "todos/**"
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint · Types · Patterns
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check LSP agent block parity
        run: npm run lsp:check-agent-block

      - name: ESLint suppressions are pruned
        run: npm run lint:suppress:check

      - name: Type check
        run: npm run check:types

      - name: Accessibility patterns
        run: node scripts/check-accessibility.js

      - name: Hardcoded colors
        run: node scripts/check-hardcoded-colors.js

      - name: IDOR storage check
        run: node scripts/check-idor-storage.js

      - name: JSDOM pragma check
        run: node scripts/check-jsdom-pragma.js

      - name: Verify .github/copilot-instructions.md is current
        run: npm run build:copilot-instructions:check

      - name: Commit-verify hook tests
        run: bash .claude/hooks/test-commit-verify.sh
      - name: Branch-preflight hook tests
        run: bash .claude/hooks/test-branch-preflight.sh
      - name: Batch-size guard hook tests
        run: bash .claude/hooks/test-batch-size-guard.sh
      - name: PR-verify hook tests
        run: bash .claude/hooks/test-pr-verify.sh
      - name: PR preflight guard hook test
        run: bash .claude/hooks/test-pr-preflight-guard.sh
      - name: Session recent-issues hook test
        run: bash .claude/hooks/test-session-recent-issues.sh

  test:
    name: Tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    needs: checks

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ocrecipes
          POSTGRES_PASSWORD: ocrecipes
          POSTGRES_DB: ocrecipes_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ocrecipes:ocrecipes@localhost:5432/ocrecipes_test
      JWT_SECRET: ci-test-jwt-secret-minimum-32-chars-long
      LOG_LEVEL: silent
      # Stub external APIs so tests never hit real endpoints
      AI_INTEGRATIONS_OPENAI_API_KEY: sk-stub
      USDA_API_KEY: stub
      API_NINJAS_KEY: stub
      RECEIPT_VALIDATION_STUB: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enable pg_trgm extension
        run: psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Push database schema
        run: npm run db:push

      - name: Tests
        run: npm run test:run -- --shard=${{ matrix.shard }}/${{ strategy.job-total }}

  coverage:
    name: Coverage thresholds
    runs-on: ubuntu-latest
    needs: checks

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ocrecipes
          POSTGRES_PASSWORD: ocrecipes
          POSTGRES_DB: ocrecipes_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ocrecipes:ocrecipes@localhost:5432/ocrecipes_test
      JWT_SECRET: ci-test-jwt-secret-minimum-32-chars-long
      LOG_LEVEL: silent
      AI_INTEGRATIONS_OPENAI_API_KEY: sk-stub
      USDA_API_KEY: stub
      API_NINJAS_KEY: stub
      RECEIPT_VALIDATION_STUB: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enable pg_trgm extension
        run: psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Push database schema
        run: npm run db:push

      - name: Tests (with coverage)
        run: npm run test:coverage:ci

  solutions-db-gates:
    # Proves the DB↔mirror invariant and the inject-hook cut-over hold: a future edit to
    # parse.ts / serialize.ts / inject-patterns.sh could pass the pure-lib unit tests while
    # silently breaking parity / round-trip / hook-equivalence. These three gates are the only
    # automated check that catches that. They run against a committed FIXTURE corpus (the real
    # docs/solutions/ tree is gitignored, so CI has none) and a STUB embedder (SOLUTIONS_EMBED_STUB=1)
    # — no OpenAI key, no API cost. See todos/archive/P3-2026-06-14-solutions-db-gates-in-ci.md.
    name: Solutions-DB gates (parity · round-trip · hook-equiv)
    runs-on: ubuntu-latest
    needs: checks

    services:
      solutions_pg:
        # pgvector/pgvector ships the `vector` extension; `pg_trgm` is contrib (bundled).
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: solutions
          POSTGRES_PASSWORD: solutions
          POSTGRES_DB: ocrecipes_solutions
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Owner/superuser URL — used by solutions:db:init (CREATE EXTENSION / CREATE ROLE),
      # ingest, and parity. POSTGRES_USER is the cluster superuser.
      SOLUTIONS_DATABASE_URL: postgresql://solutions:solutions@localhost:5432/ocrecipes_solutions
      # SELECT-only role created by schema.sql — used by the inject hook (Gate C) and MCP server.
      SOLUTIONS_DB_READONLY_URL: postgresql://solutions_ro:solutions_ro@localhost:5432/ocrecipes_solutions
      # Deterministic, key-free embedder — satisfies parity's nullEmbeddings=0 with no OpenAI key.
      SOLUTIONS_EMBED_STUB: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply solutions-db schema (extensions, table, solutions_ro role)
        run: npm run solutions:db:init

      - name: Materialize fixture corpus into docs/solutions/
        # docs/solutions/ is gitignored, so the checkout has none. The gate scripts and the
        # inject hook both read the hardcoded docs/solutions/ path, so the fixture set must
        # physically live there. Copy the committed, real-corpus fixtures into place.
        run: |
          # Guard against a vacuous pass: an empty corpus makes all three gates trivially green.
          count=$(find scripts/solutions-db/__fixtures__/solutions -name '*.md' | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "ERROR: no fixture solution files found — gates would pass vacuously" >&2
            exit 1
          fi
          echo "Materializing $count fixture solution files."
          mkdir -p docs/solutions
          cp -R scripts/solutions-db/__fixtures__/solutions/. docs/solutions/

      - name: Ingest fixture corpus (stub embedder)
        run: npm run solutions:db:ingest

      - name: Gate A — parity (DB content_hash == disk content_hash)
        run: npm run solutions:db:parity

      - name: Gate B — full-corpus round-trip (serialize→reparse→stored-hash)
        run: npm run solutions:db:export -- --verify

      - name: Gate C — hook equivalence (DB inject path == markdown fallback path)
        run: npm run solutions:db:hook-check
