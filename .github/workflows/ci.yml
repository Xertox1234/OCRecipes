name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "todos/**"
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint · Types · Patterns
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: ESLint suppressions are pruned
        run: npm run lint:suppress:check

      - name: Type check
        run: npm run check:types

      - name: Accessibility patterns
        run: node scripts/check-accessibility.js

      - name: Hardcoded colors
        run: node scripts/check-hardcoded-colors.js

      - name: BottomSheetModal BackHandler wiring
        run: node scripts/check-bottomsheet-backhandler.js

      - name: IDOR storage check
        run: node scripts/check-idor-storage.js

      - name: JSDOM pragma check
        run: node scripts/check-jsdom-pragma.js

      - name: Rules file size cap (docs/rules/*.md)
        run: node scripts/check-rules-file-size.js

      - name: Verify .github/copilot-instructions.md is current
        run: npm run build:copilot-instructions:check

      # Single source shared with scripts/preflight.sh (full mode): the glob loop, git-env
      # strip, per-test fail-fast, and zero-count guard all live in scripts/run-hook-tests.sh,
      # so this step and preflight can't drift. Add or rename hooks there, not here.
      - name: Hook self-tests (.claude/hooks/test-*.sh)
        run: bash scripts/run-hook-tests.sh

  test:
    name: Tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    needs: checks

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ocrecipes
          POSTGRES_PASSWORD: ocrecipes
          POSTGRES_DB: ocrecipes_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ocrecipes:ocrecipes@localhost:5432/ocrecipes_test
      JWT_SECRET: ci-test-jwt-secret-minimum-32-chars-long
      LOG_LEVEL: silent
      # Stub external APIs so tests never hit real endpoints
      AI_INTEGRATIONS_OPENAI_API_KEY: sk-stub
      USDA_API_KEY: stub
      API_NINJAS_KEY: stub
      RECEIPT_VALIDATION_STUB: "true"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enable pg_trgm extension
        run: psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Push database schema
        run: npm run db:push

      - name: Tests
        run: npm run test:run -- --shard=${{ matrix.shard }}/${{ strategy.job-total }}

  integration-http:
    name: Real-DB HTTP integration (auth) — advisory
    runs-on: ubuntu-latest
    needs: checks
    # Advisory only — deliberately NOT added to required status checks in
    # branch protection (that omission, not continue-on-error, is what keeps
    # it non-blocking: a job's pass/fail can only gate a merge if a human
    # adds its name to the required-checks list). See test/integration/
    # README.md: this suite drives real Postgres + real bcrypt (slower, more
    # flakiness-prone than the mocked unit/route suite), so it stays out of
    # the required/fast gates. It still runs automatically on every push/PR,
    # with its real pass/fail fully visible in the PR checks list, so an
    # auth-wiring regression is caught on the push that introduces it — not
    # only when a developer remembers to run it locally.
    #
    # Deliberately NOT continue-on-error: true — at the job level that
    # reports job.result as "success" even when a step failed (only the
    # workflow-run conclusion still reflects the failure), which would make
    # a real regression here read as green/passing rather than visibly
    # failed. A plain job with real red/green status, simply absent from the
    # required-checks list, is the unambiguous way to be "visible but
    # non-blocking."

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ocrecipes
          POSTGRES_PASSWORD: ocrecipes
          POSTGRES_DB: ocrecipes_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ocrecipes:ocrecipes@localhost:5432/ocrecipes_test
      JWT_SECRET: ci-test-jwt-secret-minimum-32-chars-long
      LOG_LEVEL: silent
      AI_INTEGRATIONS_OPENAI_API_KEY: sk-stub
      USDA_API_KEY: stub
      API_NINJAS_KEY: stub
      RECEIPT_VALIDATION_STUB: "true"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enable pg_trgm extension
        run: psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Push database schema
        run: npm run db:push

      - name: Real-DB HTTP integration tests
        run: npm run test:integration:http

  coverage:
    name: Coverage thresholds
    runs-on: ubuntu-latest
    needs: checks

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ocrecipes
          POSTGRES_PASSWORD: ocrecipes
          POSTGRES_DB: ocrecipes_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ocrecipes:ocrecipes@localhost:5432/ocrecipes_test
      JWT_SECRET: ci-test-jwt-secret-minimum-32-chars-long
      LOG_LEVEL: silent
      AI_INTEGRATIONS_OPENAI_API_KEY: sk-stub
      USDA_API_KEY: stub
      API_NINJAS_KEY: stub
      RECEIPT_VALIDATION_STUB: "true"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enable pg_trgm extension
        run: psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Push database schema
        run: npm run db:push

      - name: Tests (with coverage)
        run: npm run test:coverage:ci
