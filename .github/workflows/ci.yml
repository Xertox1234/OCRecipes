name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "todos/**"
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint · Types · Patterns
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check LSP agent block parity
        run: npm run lsp:check-agent-block

      - name: ESLint suppressions are pruned
        run: npm run lint:suppress:check

      - name: Type check
        run: npm run check:types

      - name: Accessibility patterns
        run: node scripts/check-accessibility.js

      - name: Hardcoded colors
        run: node scripts/check-hardcoded-colors.js

      - name: IDOR storage check
        run: node scripts/check-idor-storage.js

      - name: JSDOM pragma check
        run: node scripts/check-jsdom-pragma.js

      - name: Verify .github/copilot-instructions.md is current
        run: npm run build:copilot-instructions:check

      # Hermetic Python/bash tests for the Kimi review engine (scripts/kimi-review.py)
      # and its wrappers. No DB, npm, API key, or network — python3 is preinstalled
      # on ubuntu-latest. The canonical-engine parity block self-SKIPs when that
      # engine is absent (it always is in CI), so only the vendored copy is tested.
      - name: Kimi review engine tests
        run: bash .claude/hooks/test-kimi-review.sh

      - name: Commit-verify hook tests
        run: bash .claude/hooks/test-commit-verify.sh

  test:
    name: Tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    needs: checks

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ocrecipes
          POSTGRES_PASSWORD: ocrecipes
          POSTGRES_DB: ocrecipes_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ocrecipes:ocrecipes@localhost:5432/ocrecipes_test
      JWT_SECRET: ci-test-jwt-secret-minimum-32-chars-long
      LOG_LEVEL: silent
      # Stub external APIs so tests never hit real endpoints
      AI_INTEGRATIONS_OPENAI_API_KEY: sk-stub
      USDA_API_KEY: stub
      API_NINJAS_KEY: stub
      RECEIPT_VALIDATION_STUB: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enable pg_trgm extension
        run: psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Push database schema
        run: npm run db:push

      - name: Tests
        run: npm run test:run -- --shard=${{ matrix.shard }}/${{ strategy.job-total }}

  coverage:
    name: Coverage thresholds
    runs-on: ubuntu-latest
    needs: checks

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ocrecipes
          POSTGRES_PASSWORD: ocrecipes
          POSTGRES_DB: ocrecipes_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ocrecipes:ocrecipes@localhost:5432/ocrecipes_test
      JWT_SECRET: ci-test-jwt-secret-minimum-32-chars-long
      LOG_LEVEL: silent
      AI_INTEGRATIONS_OPENAI_API_KEY: sk-stub
      USDA_API_KEY: stub
      API_NINJAS_KEY: stub
      RECEIPT_VALIDATION_STUB: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enable pg_trgm extension
        run: psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Push database schema
        run: npm run db:push

      - name: Tests (with coverage)
        run: npm run test:coverage:ci
