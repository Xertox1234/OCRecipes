name: Copilot Instructions Drift Check

# `scripts/lib/path-domains.ts` (and `docs/rules/**`) feed two generators:
# `build-copilot-instructions.ts` -> `.github/copilot-instructions.md`, and
# `build-domain-map.ts` -> `.claude/hooks/lib/domain-map.sh`. Without this
# dedicated workflow a docs-only push that edits a source file would be skipped
# by `ci.yml`'s `paths-ignore` and a generated artifact could go stale undetected.
on:
  push:
    branches: [main]
    paths:
      - "docs/rules/**"
      - "scripts/build-copilot-instructions.ts"
      - "scripts/build-domain-map.ts"
      - "scripts/lib/path-domains.ts"
      - "scripts/delegate-copilot-issue.ts"
      - ".github/copilot-instructions.md"
      - ".claude/hooks/lib/domain-map.sh"
  pull_request:
    branches: ["**"]
    paths:
      - "docs/rules/**"
      - "scripts/build-copilot-instructions.ts"
      - "scripts/build-domain-map.ts"
      - "scripts/lib/path-domains.ts"
      - "scripts/delegate-copilot-issue.ts"
      - ".github/copilot-instructions.md"
      - ".claude/hooks/lib/domain-map.sh"

concurrency:
  group: copilot-instructions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Verify generated artifacts are current
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify generated Copilot instructions + domain-map.sh match sources
        run: npm run build:generated:check

      - name: Shellcheck the generated domain-map.sh
        run: shellcheck .claude/hooks/lib/domain-map.sh
