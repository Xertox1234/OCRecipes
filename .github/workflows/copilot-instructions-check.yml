name: Copilot Instructions Drift Check

# `docs/rules/**` feeds `scripts/build-copilot-instructions.ts`, which writes
# `.github/copilot-instructions.md`. Without this dedicated workflow a docs-only
# push that edits a rules file would be skipped by `ci.yml`'s `paths-ignore`
# and the generated instructions file could go stale undetected.
on:
  push:
    branches: [main]
    paths:
      - "docs/rules/**"
      - "scripts/build-copilot-instructions.ts"
      - "scripts/delegate-copilot-issue.ts"
      - ".github/copilot-instructions.md"
  pull_request:
    branches: ["**"]
    paths:
      - "docs/rules/**"
      - "scripts/build-copilot-instructions.ts"
      - "scripts/delegate-copilot-issue.ts"
      - ".github/copilot-instructions.md"

concurrency:
  group: copilot-instructions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Verify .github/copilot-instructions.md is current
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify generated Copilot instructions match docs/rules sources
        run: npm run build:copilot-instructions:check
