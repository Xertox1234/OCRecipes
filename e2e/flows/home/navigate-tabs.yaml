appId: com.ocrecipes.app
name: "Home - Navigate between tabs"
tags:
  - smoke
  - regression
  - navigation
env:
  USERNAME: ${USERNAME}
  PASSWORD: ${PASSWORD}
---
# Login first
- launchApp
- runFlow:
    file: ../../helpers/login.yaml
    env:
      USERNAME: ${USERNAME}
      PASSWORD: ${PASSWORD}

# Verify Home tab (default after login)
- assertVisible:
    text: "Hello"
    timeout: 10000

# Navigate to Plan tab
- tapOn: "Plan"
- assertVisible:
    text: "Recipes"
    timeout: 5000

# Navigate to Coach tab. Free tier lands on the chat list ("NutriCoach"
# header); Pro lands on the Coach Pro surface — so the assertion is optional.
- tapOn: "Coach"
- assertVisible:
    text: "NutriCoach"
    timeout: 5000
  optional: true

# Scan is a floating action button, not a tab — confirm it is present without
# opening it (the scan menu is covered by the scan flows).
- assertVisible:
    text: "Open scan menu"
    timeout: 3000
  optional: true

# Navigate to Profile tab
- tapOn: "Profile"
- assertVisible:
    text: "Tap to change profile picture"
    timeout: 5000
  optional: true

# Navigate back to Home
- tapOn: "Home"
- assertVisible:
    text: "Hello"
    timeout: 5000
