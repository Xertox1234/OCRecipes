appId: com.ocrecipes.app
name: "Home - View item detail from history"
tags:
  - regression
  - history
env:
  USERNAME: ${USERNAME}
  PASSWORD: ${PASSWORD}
---
# Login first
- launchApp
- runFlow:
    file: ../../helpers/login.yaml
    env:
      USERNAME: ${USERNAME}
      PASSWORD: ${PASSWORD}

# History is not a tab — it lives at Profile → Library → Scan History
- tapOn: "Profile"
- scrollUntilVisible:
    element: "Scan History"
    direction: DOWN
  optional: true
- tapOn: "Scan History"

# Verify the history screen loads (header title)
- assertVisible:
    text: "Scan History"
    timeout: 5000

# Verify the scan CTA is visible (shown when no items today)
- assertVisible:
    text: "Scan barcode"
    timeout: 3000
  optional: true
