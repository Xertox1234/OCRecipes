appId: com.ocrecipes.app
name: "Plan - Import recipe from URL"
tags:
  - plan
  - recipes
env:
  USERNAME: ${USERNAME}
  PASSWORD: ${PASSWORD}
---
# Login first
- launchApp
- runFlow:
    file: ../../helpers/login.yaml
    env:
      USERNAME: ${USERNAME}
      PASSWORD: ${PASSWORD}

# Navigate to Plan tab
- tapOn: "Plan"
- assertVisible:
    text: "Recipes"
    timeout: 5000

# Open recipe browser
- tapOn: "Recipes"
- assertVisible:
    text: "Search recipes..."
    timeout: 5000

# Tap Import button
- tapOn: "Import"
- assertVisible:
    text: "https://example.com/recipe"
    timeout: 3000

# Verify import UI elements
- assertVisible: "Import"

# Enter a URL
- tapOn: "https://example.com/recipe"
- inputText: "https://www.allrecipes.com/recipe/test"

# Verify Import button is now enabled
- assertVisible: "Import"
