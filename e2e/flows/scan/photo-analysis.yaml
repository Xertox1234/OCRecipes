appId: com.ocrecipes.app
name: "Scan - Photo analysis intent selection"
tags:
  - scan
  - photo
env:
  USERNAME: ${USERNAME}
  PASSWORD: ${PASSWORD}
---
# Login first
- launchApp
- runFlow:
    file: ../../helpers/login.yaml
    env:
      USERNAME: ${USERNAME}
      PASSWORD: ${PASSWORD}

# Navigate to Scan tab (mandatory)
- tapOn: "Scan"

# Camera permission may appear
- tapOn:
    text: "Allow"
  optional: true

# The photo intent screen requires a photo to be taken first.
# In simulator, camera is unavailable — these assertions validate the
# intent screen UI only when reachable (e.g. via gallery selection).
- assertVisible:
    text: "Log this meal"
    timeout: 5000
  optional: true
- assertVisible:
    text: "Quick calorie check"
  optional: true
- assertVisible:
    text: "Just identify"
  optional: true

# Premium features should show lock indicator
- assertVisible:
    text: "Find recipes"
  optional: true
- assertVisible:
    text: "Scan restaurant menu"
  optional: true
